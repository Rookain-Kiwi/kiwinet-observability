###############################################################################
# prometheus.yml : Configuration Prometheus
# Projet  : kiwinet.me
# VM      : Debian 13.3 ARM AArch64 (Freebox Delta)
###############################################################################

global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    scrape_interval: 60s
    static_configs:
      - targets: ["cadvisor:8080"]